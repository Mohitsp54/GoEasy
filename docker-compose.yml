version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: goeasy-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  auth-service:
    build:
      context: ./Services/Authentication
      dockerfile: Dockerfile
    container_name: goeasy-auth-service
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/goeasy
      - JWT_SECRET=supersecretjwtkey_please_change_in_production
    depends_on:
      - mongodb

volumes:
  mongodb_data:
